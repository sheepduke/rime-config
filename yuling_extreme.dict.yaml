---
name: "yuling_extreme"
version: "20260619"
sort: original
import_tables:
  # 以下是簡碼字詞，空格上屏
  - yuhao/yuling.quick
  # 以下是簡碼字詞，韻碼上屏
  - yuhao/yuling.pop
  # 以下是單字五碼，包括陸標、臺標、港標、兼容拆分
  - yuhao/yuling.five
  # 以下是高優先級用户自定义詞庫
  - yuhao/yuhao.private
  # 以下是字根提示
  - yuhao/yuling.roots
  # 以下是宇浩極簡千詞詞庫
  - yuhao/yuling_sc.words_essence
  - yuhao/yuling.words_essence
  # 以下是全碼詞庫
  - yuhao/yuling_sc.words 
  - yuhao/yuling_tc.words
  # 以下是低優先級用户自定义詞庫
  - yuhao/yuhao.extended
  # 以下是符號
  - yuhao/yuhao.symbols
columns:
  - text
  - code
encoder:
  exclude_patterns:
    - "^[a-z]$"
    - "[^a-z]"
  rules:
    - length_equal: 2
      formula: "AaAbBaBbBc"
    - length_equal: 3
      formula: "AaBaCaCbCc"
    - length_in_range: [4, 20]
      formula: "AaBaCaZaZb"
...

