patch:
  ascii_composer:
    switch_key:
        Shift_L: noop
        
  menu:
    # 候选词数量，最多支持 10 个
    page_size: 5

  schema_list:
    # 菜单中可选的方案列表，可根据喜好自行调整顺序，第一位为默认方案
    - schema: yuling
    - schema: tiger
    - schema: double_pinyin
    - schema: wubi98
    - schema: wubi86_jidian
    - schema: pinyin_simp

  key_binder/bindings:
    - { when: composing, accept: Control+p, send: Page_Up }
    - { when: composing, accept: Control+n, send: Page_Down }

    # 候选2用分号
    - { when: has_menu, accept: semicolon, send: 2 }
    
    # 候选3用单引号
    - { when: has_menu, accept: apostrophe, send: 3 }

    # Tab清屏
    - { when: composing, accept: Tab, send: Escape } 
    
    # 取消一些快捷键
    - {accept: "Shift+Alt", toggle: noop}
    - {accept: "Shift+space", toggle: noop}
    - {accept: "Control+period", toggle: noop}
